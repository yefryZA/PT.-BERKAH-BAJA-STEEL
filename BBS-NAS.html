<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBS SYSTEM - PT. BERKAH BAJA STEEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --blue-dark: #0A192F; --silver: #C0C0C0; --gold: #FFD700; --red: #FF4D4D; --glass: rgba(255, 255, 255, 0.1); --green: #64FFDA; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-transform: uppercase; } /* SEMUA HURUF BESAR */
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #112240 0%, var(--blue-dark) 100%); color: #fff; margin: 0; min-height: 100vh; text-transform: none; }
        b, h1, h2, .lbl, .val, input { text-transform: uppercase; }

        .header-bbs { padding: 20px 10px; background: linear-gradient(to bottom, #000, #112240); border-bottom: 3px solid var(--silver); text-align: center; }
        .header-bbs h1 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--silver); margin: 0; letter-spacing: 1px; }
        .header-bbs p { font-family: 'Poppins'; font-size: 9px; color: var(--gold); margin: 5px 0 0 0; }
        
        .container { padding: 15px; display: none; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--glass); border: 1px solid var(--glass); border-radius: 15px; padding: 15px; backdrop-filter: blur(10px); position: relative; }
        
        .otw-container { background: linear-gradient(45deg, #FF9800, #F44336); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 10px; }
        .otw-val { font-family: 'Orbitron'; font-size: 32px; font-weight: bold; color: #fff; display: block; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--glass); }
        .lbl { font-size: 9px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; }
        .val { font-family: 'Orbitron'; font-size: 16px; color: #fff; }

        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #233554; color: #fff; border-radius: 8px; font-family: 'Orbitron'; margin-top: 5px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; font-family: 'Poppins'; cursor: pointer; }
        .btn-green { background: var(--green); color: #0A192F; }
        .btn-gold { background: var(--gold); color: #0A192F; }

        #margin-area { display: none; border: 1px dashed var(--gold); padding: 15px; border-radius: 10px; margin-top: 15px; background: rgba(255,215,0,0.05); }
        .lock-btn { position: absolute; right: 15px; top: 15px; cursor: pointer; font-size: 20px; }

        .truck-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="border: 5px solid #f3f3f3; border-top: 5px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <div id="load-txt" style="color:var(--gold); font-family:Orbitron; margin-top:15px; font-size:12px;">MENGOMPRES & MENGIRIM FOTO...</div>
    </div>

    <div class="header-bbs">
        <h1>PT. BERKAH BAJA STEEL</h1>
        <p>GENERAL CONTRACTOR & LOGISTIK</p>
    </div>

    <div id="view-dashboard" class="container">
        <div class="otw-container">
            <span class="lbl" style="color:#fff">UNIT DALAM PERJALANAN (OTW)</span>
            <span id="d-count-otw" class="otw-val">0</span>
        </div>

        <div class="card">
            <span class="lock-btn" onclick="toggleMargin()">🔐</span>
            <span class="lbl">TOTAL VOLUME (M3)</span>
            <div class="stat-grid">
                <div class="stat-box"><span class="lbl">TOTAL MUAT</span><span id="d-total-muat" class="val">0</span></div>
                <div class="stat-box"><span class="lbl">TOTAL BONGKAR</span><span id="d-total-bongkar" class="val">0</span></div>
                <div class="stat-box" style="grid-column: span 2; border-color: var(--red);">
                    <span class="lbl" style="color:var(--red)">TOTAL LOSS</span>
                    <span id="d-total-loss" class="val" style="color:var(--red); font-size: 24px;">0</span>
                </div>
            </div>

            <div id="margin-area">
                <div class="stat-grid">
                    <div class="stat-box"><span class="lbl">OMZET</span><div id="d-omzet" class="val">0</div></div>
                    <div class="stat-box"><span class="lbl">MODAL</span><div id="d-modal" class="val">0</div></div>
                    <div class="stat-box" style="grid-column: span 2; background: rgba(100, 255, 218, 0.1);">
                        <span id="d-margin" class="val" style="color:var(--green); font-size:18px;">Rp 0</span>
                    </div>
                </div>
                <button class="btn" style="margin-top:10px; font-size:10px; height:auto; padding:8px;" onclick="openAdmin()">⚙️ PENGATURAN HARGA / RESET</button>
            </div>
        </div>

        <div class="card">
            <span class="lbl">DAFTAR AKTIVITAS KENDARAAN</span>
            <div id="log-list"></div>
            <button class="btn" style="background:var(--silver); color:#000; margin-top:15px;" onclick="generatePDF()">DOWNLOAD REKAP PDF 📄</button>
        </div>
    </div>

    <div id="view-cilegon" class="container">
        <div class="card">
            <h2 style="font-family:Orbitron; color:var(--green); font-size:18px;">INPUT MUAT - MERAK</h2>
            <label class="lbl">NOMOR PLAT</label><input type="text" id="m-plat" placeholder="B 1234 BBS">
            <label class="lbl">VOLUME MUAT (M3)</label><input type="number" id="m-vol" step="0.01">
            
            <label class="lbl">FOTO SURAT JALAN (WAJIB)</label>
            <input type="file" capture="camera" id="m-foto" accept="image/*">
            
            <label class="lbl">FOTO KTP / SIM SOPIR (IDENTITAS)</label>
            <input type="file" capture="camera" id="m-ktp" accept="image/*">
            
            <button class="btn btn-green" onclick="prosesMuat()">KIRIM DATA MUAT 🚛</button>
        </div>
    </div>

    <div id="view-jakarta" class="container">
        <div class="card">
            <h2 style="font-family:Orbitron; color:var(--gold); font-size:18px;">INPUT BONGKAR - JKT</h2>
            <label class="lbl">PILIH PLAT MOBIL</label><select id="b-pilih-mobil"></select>
            <label class="lbl">VOLUME BONGKAR (M3)</label><input type="number" id="b-vol" step="0.01">
            <label class="lbl">FOTO AKTUAL BONGKAR (KAMERA)</label>
            <input type="file" capture="camera" id="b-foto" accept="image/*">
            <button class="btn btn-gold" onclick="prosesBongkar()">KONFIRMASI BONGKAR ⚓</button>
        </div>
    </div>

    <div id="modal-admin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; overflow-y:auto;">
        <div class="card" style="max-width:400px; margin:auto;">
            <h3 style="color:var(--gold)">ADMIN PANEL</h3>
            <label class="lbl">HARGA BELI /M3</label><input type="number" id="cfg-beli">
            <label class="lbl">HARGA JUAL /M3</label><input type="number" id="cfg-jual">
            <button class="btn btn-green" onclick="saveSettings()">SIMPAN</button>
            <hr style="border:0.5px solid var(--glass); margin:15px 0;">
            <button class="btn" style="background:var(--red); color:#fff" onclick="resetBBS()">RESET TOTAL DATA</button>
            <button class="btn" style="background:none; color:#8892B0" onclick="closeAdmin()">TUTUP</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "berkah-baja-steel" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "BBS_PROYEK_SATOE";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyZhTJrSLlzeV8DyC1NcZciJyUrTLzMff5UahkTpZcDuF6PPX2o4E9Pc2K_guOhMjEh/exec";

    const mode = new URLSearchParams(window.location.search).get('mode');
    if(mode === 'cilegon') document.getElementById('view-cilegon').style.display = 'flex';
    else if(mode === 'jakarta') document.getElementById('view-jakarta').style.display = 'flex';
    else document.getElementById('view-dashboard').style.display = 'flex';

    // FUNGSI KOMPRES FOTO & UPLOAD
    async function uploadFoto(file, fileName) {
        if(!file) return "";
        document.getElementById('loader').style.display = 'flex';
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // Ukuran kecil biar loading cepat
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];
                    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ base64, type: "image/jpeg", name: fileName }) });
                    const json = await res.json();
                    document.getElementById('loader').style.display = 'none';
                    resolve(json.url || "");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    window.prosesMuat = async () => {
        const plat = document.getElementById('m-plat').value.toUpperCase();
        const vol = document.getElementById('m-vol').value;
        const fileSJ = document.getElementById('m-foto').files[0];
        const fileKTP = document.getElementById('m-ktp').files[0]; // Foto Identitas
        
        if(!plat || !vol || !fileSJ || !fileKTP) return alert("LENGKAPI DATA, FOTO SURAT JALAN & KTP!");
        
        // Upload Foto Surat Jalan
        const urlFotoSJ = await uploadFoto(fileSJ, `MUAT_SJ_${plat}.jpg`);
        // Upload Foto KTP
        const urlFotoKTP = await uploadFoto(fileKTP, `KTP_${plat}.jpg`);
        
        await push(ref(db, `bbs_logs/${dbKey}`), { 
            plat, 
            volM: Number(vol), 
            volB: 0, 
            status: 'OTW', 
            fotoM: urlFotoSJ, 
            fotoKTP: urlFotoKTP, // Data KTP masuk ke Database
            jamM: new Date().toLocaleTimeString(), 
            tgl: new Date().toLocaleDateString('id-ID') 
        });
        
        alert("DATA MUAT & IDENTITAS TERKIRIM!"); 
        location.reload();
    }

    window.prosesBongkar = async () => {
        const id = document.getElementById('b-pilih-mobil').value;
        const vol = document.getElementById('b-vol').value;
        const file = document.getElementById('b-foto').files[0];
        if(!id || !vol || !file) return alert("LENGKAPI DATA & JEPRET FOTO!");
        const urlFoto = await uploadFoto(file, `BONGKAR_${id}.jpg`);
        await update(ref(db, `bbs_logs/${dbKey}/${id}`), { volB: Number(vol), status: 'DONE', fotoB: urlFoto, jamB: new Date().toLocaleTimeString() });
        alert("DATA BONGKAR TERSELESAIKAN!"); location.reload();
    }

    let rawData = [];
    onValue(ref(db, `bbs_logs/${dbKey}`), (snap) => {
        const data = snap.val();
        const list = document.getElementById('log-list');
        const select = document.getElementById('b-pilih-mobil');
        list.innerHTML = ""; select.innerHTML = '<option value="">-- PILIH MOBIL --</option>';
        let tm = 0, tb = 0, otw = 0; rawData = [];
        if(data) {
            Object.keys(data).forEach(k => {
                const i = data[k]; tm += i.volM; tb += i.volB; rawData.push(i);
                if(i.status === 'OTW') {
                    otw++; let opt = document.createElement('option'); opt.value = k; opt.text = i.plat; select.appendChild(opt);
                }
                let item = document.createElement('div'); item.className = 'truck-item';
                item.innerHTML = `<div><b>${i.plat}</b><br><small><a href="${i.fotoM}" target="_blank" style="color:var(--green)">FOTO MUAT</a> | <a href="${i.fotoB||'#'}" target="_blank" style="color:var(--gold)">FOTO BONGKAR</a></small></div> <span class="badge" style="background:${i.status==='OTW'?'#FF9800':'#4CAF50'}; padding:3px 8px; border-radius:4px;">${i.status}</span>`;
                list.appendChild(item);
            });
        }
        document.getElementById('d-count-otw').innerText = otw;
        document.getElementById('d-total-muat').innerText = tm.toFixed(2);
        document.getElementById('d-total-bongkar').innerText = tb.toFixed(2);
        document.getElementById('d-total-loss').innerText = (tm - tb).toFixed(2);
        updateMoney(tb);
    });

    async function updateMoney(tb) {
        const s = await get(ref(db, `bbs_settings/${dbKey}`));
        const c = s.val() || { beli: 0, jual: 0 };
        document.getElementById('d-omzet').innerText = "RP " + (tb*c.jual).toLocaleString();
        document.getElementById('d-modal').innerText = "RP " + (tb*c.beli).toLocaleString();
        document.getElementById('d-margin').innerText = "MARGIN: RP " + (tb*(c.jual-c.beli)).toLocaleString();
    }

    // FUNGSI PDF REKAP
    // FUNGSI PDF REKAP (VERSI TANDA TANGAN RAPI)
    window.generatePDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header
        doc.setFontSize(16); doc.text("PT. BERKAH BAJA STEEL", 105, 15, { align: "center" });
        doc.setFontSize(10); doc.text("GENERAL CONTRACTOR & LOGISTIK", 105, 22, { align: "center" });
        doc.line(20, 25, 190, 25);
        
        // Isi Tabel
        const tableBody = rawData.map(i => [i.tgl, i.plat, i.volM, i.volB, (i.volM - i.volB).toFixed(2), i.status]);
        doc.autoTable({ 
            head: [['TANGGAL', 'PLAT', 'MUAT (M3)', 'BONGKAR (M3)', 'LOSS', 'STATUS']], 
            body: tableBody, 
            startY: 30,
            theme: 'grid',
            headStyles: { fillColor: [10, 25, 47] } // Warna biru gelap BBS
        });
        
        // Bagian Tanda Tangan (Posisi Kanan Bawah)
        let finalY = doc.lastAutoTable.finalY + 20;
        const signatureX = 160; // Titik koordinat horizontal

        doc.setFontSize(11);
        doc.text("MENGETAHUI,", signatureX, finalY, { align: "center" });
        
        // Ruang kosong untuk tanda tangan diberikan jarak 25-30 unit
        doc.setFont("helvetica", "bold"); // Nama dibuat tebal
        doc.text("YEFRY ZA.", signatureX, finalY + 30, { align: "center" });
        
        doc.setFont("helvetica", "normal"); // Jabatan normal
        doc.text("MANAGER", signatureX, finalY + 35, { align: "center" });
        
        // Simpan File
        doc.save("REKAP_BBS_" + new Date().toLocaleDateString() + ".pdf");
    };

    window.toggleMargin = () => { if(prompt("PASS ADMIN?") === "LSI2026") { let a = document.getElementById('margin-area'); a.style.display = a.style.display==='block'?'none':'block'; } };
    window.openAdmin = () => document.getElementById('modal-admin').style.display = 'block';
    window.closeAdmin = () => document.getElementById('modal-admin').style.display = 'none';
    window.saveSettings = async () => {
        await set(ref(db, `bbs_settings/${dbKey}`), { beli: Number(document.getElementById('cfg-beli').value), jual: Number(document.getElementById('cfg-jual').value) });
        alert("HARGA DISIMPAN!"); closeAdmin();
    };
    window.resetBBS = async () => { if(confirm("HAPUS SEMUA DATA PROYEK?")) { await remove(ref(db, `bbs_logs/${dbKey}`)); location.reload(); } };
</script>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
